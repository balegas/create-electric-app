# Cloudflare Pages configuration for the electric-agent web UI.
# Deploy: wrangler pages deploy ./dist --project-name electric-agent
#
# Required env vars (set via Cloudflare dashboard):
#   ANTHROPIC_API_KEY    - For creating Sprites and running agents
#   DURABLE_STREAMS_URL  - Durable Streams server URL
#   DURABLE_STREAMS_AUTH - Auth header for Durable Streams
#
# Cloudflare Pages gives free per-PR preview URLs automatically
# when connected to a GitHub repo.

name = "electric-agent"
compatibility_date = "2025-12-01"
pages_build_output_dir = "./dist"
