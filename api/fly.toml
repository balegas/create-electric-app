# Fly.io configuration for the electric-agent API server.
# Deploy: fly deploy --config api/fly.toml
#
# Required secrets (set via `fly secrets set`):
#   ANTHROPIC_API_KEY    - Claude API key for agent execution
#   FLY_API_TOKEN        - Fly Machines API (to create per-session sandboxes)
#   TIGRIS_ACCESS_KEY    - Tigris object storage (download hosting)
#   TIGRIS_SECRET_KEY    - Tigris object storage
#
# See README.md "Deployment" section for full setup instructions.

app = "electric-agent-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/health"
    interval = "30s"
    timeout = "5s"
