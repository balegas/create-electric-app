app = "electric-agent"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  SANDBOX_RUNTIME = "sprites"
  MAX_TOTAL_SESSIONS = "50"
  MAX_SESSIONS_PER_IP_PER_HOUR = "5"
  MAX_SESSION_COST_USD = "5"
  # GitHub App secrets (GITHUB_APP_ID, GITHUB_INSTALLATION_ID, GITHUB_PRIVATE_KEY)
  # are set via `fly secrets set` — not listed here

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
