name: Changeset Check

on:
  pull_request:
    branches: [main]

jobs:
  changeset:
    name: Changeset Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Check for changeset
        run: npx changeset status --since=origin/main
