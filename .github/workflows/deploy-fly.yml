name: Deploy Server (Fly.io)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "fly.toml"
      - "Dockerfile.fly"
      - ".github/workflows/deploy-fly.yml"

concurrency:
  group: deploy-fly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Clear stale machine leases
        run: |
          MACHINES=$(flyctl machines list --app electric-agent --json -q 2>/dev/null | jq -r '.[].id // empty' 2>/dev/null) || true
          for MID in $MACHINES; do
            echo "Clearing lease on machine $MID ..."
            flyctl machines lease clear "$MID" --app electric-agent || true
          done
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke-test deployment health
        run: |
          echo "Checking https://electric-agent.fly.dev/api/health ..."
          for i in 1 2 3 4 5 6; do
            sleep 5
            STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" "https://electric-agent.fly.dev/api/health") || true
            echo "  Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              cat /tmp/health.json
              echo ""
              echo "Health check passed"
              exit 0
            fi
          done
          echo "Health endpoint unreachable after 6 attempts"
          cat /tmp/health.json 2>/dev/null || true
          exit 1
