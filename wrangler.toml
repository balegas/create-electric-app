#:schema node_modules/wrangler/config-schema.json
name = "create-electric-app"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist/web/client"

# The Worker is a thin reverse proxy — all /api/* requests are forwarded
# to the Fly.io backend. No KV or other bindings needed.

[vars]
API_BACKEND_URL = "https://electric-agent.fly.dev"
